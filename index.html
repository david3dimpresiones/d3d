<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David 3D Impresiones</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #000;
        color: #fff;
        display: flex;
        justify-content: center;
    }

    .container {
        width: 100%;
        max-width: 420px;
        padding: 20px;
        text-align: center;
    }

    .logo {
        margin-top: 40px;
    }

    .logo img {
        width: 200px;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 0 15px rgba(255,255,255,0.1);
    }

    .username {
        margin: 15px 0 30px;
        font-size: 22px;
        font-weight: bold;
    }

    .link {
        display: flex;
        align-items: center;
        background: #111;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 15px;
        text-decoration: none;
        color: white;
        transition: 0.2s;
    }

    .link:hover {
        background: #1c1c1c;
    }

    .icon {
        width: 35px;
        height: 35px;
        margin-right: 15px;
    }

    .icon img {
        width: 100%;
    }

    .link-text {
        flex: 1;
        text-align: left;
        font-size: 16px;
    }

    <!-- CSS slider-->
    .gallery {
    width: 100%;
    max-width: 420px;
    margin: 30px auto 0;
    overflow: hidden;
    position: relative;
    border-radius: 12px;
}

.slider {
    display: flex;
    transition: transform 0.4s ease;
}

.slider img {
    width: 100%;
    flex-shrink: 0;
    object-fit: cover;
    max-height: 300px;
}

    <!-- CSS botones galeria slider -->
    .controls {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 10px;
}

.controls button {
    background: #111;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <!-- Sustituye por tu imagen -->
        <img src="https://github.com/david3dimpresiones/d3d/blob/main/Sin%20t%C3%ADtulo-1_v2.jpg?raw=true" alt="Logo">
    </div>

    <div class="username">@david3dimpresiones</div>

    <a class="link" href="https://www.facebook.com/david3dimpresiones" target="_blank">
        <div class="icon">
            <img src="https://github.com/david3dimpresiones/d3d/blob/main/logo_facebook.png?raw=true">
        </div>
        <div class="link-text">Facebook</div>
    </a>

    <a class="link" href="https://wa.me/611744141" target="_blank">
        <div class="icon">
            <img src="https://github.com/david3dimpresiones/d3d/blob/main/logo_whatsapp.png?raw=true">
        </div>
        <div class="link-text">WhatsApp</div>
    </a>

    <a class="link" href="https://davi3d.t.me" target="_blank">
        <div class="icon">
            <img src="https://github.com/david3dimpresiones/d3d/blob/main/logo_telegram.png?raw=true">
        </div>
        <div class="link-text">Telegram</div>
    </a>

    <a class="link" href="https://www.wallapop.com/user/david-51179034?_pid=wi&_uid=51179034" target="_blank">
        <div class="icon">
            <img src="https://github.com/david3dimpresiones/d3d/blob/main/logo_wallapop.png?raw=true">
        </div>
        <div class="link-text">Wallapop</div>
    </a>
<!-- galeria Slider -->
    <div class="gallery">

    <div class="slider" id="slider">
        <img src="foto1.jpg" onclick="openImg(this)">
        <img src="foto2.jpg" onclick="openImg(this)">
        <img src="foto3.jpg" onclick="openImg(this)">
        <img src="foto4.jpg" onclick="openImg(this)">
    </div>

    </div>

    <div class="controls">
    <button onclick="prev()">◀</button>
    <button onclick="next()">▶</button>
    </div>

    <!-- JS galeria slider -->
    <script>
let index = 0;

function updateSlider() {
    const slider = document.getElementById("slider");
    slider.style.transform = `translateX(-${index * 100}%)`;
}

function next() {
    const slider = document.getElementById("slider");
    if (index < slider.children.length - 1) {
        index++;
        updateSlider();
    }
}

function prev() {
    if (index > 0) {
        index--;
        updateSlider();
    }
}
</script>
</div>
    

</body>
</html>
